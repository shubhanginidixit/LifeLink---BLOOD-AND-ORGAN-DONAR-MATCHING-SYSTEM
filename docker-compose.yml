version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lifelink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifelink-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://dhanushpillay28_db_user:REDACTED_MONGO_PASSWORD@cluster0.wzrjrza.mongodb.net/lifelink?retryWrites=true&w=majority
      - JWT_SECRET=REDACTED_JWT_SECRET
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5000,https://blood-and-organ-donar-matching-syst.vercel.app
      - GOOGLE_CLIENT_ID=532800323819-grvpjhup1nh39d2doeq0ahnk61v51ip5.apps.googleusercontent.com
      - NODE_ENV=development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./lifelink-frontend
      dockerfile: Dockerfile
    container_name: lifelink-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://backend:5000
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-}
      - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY:-}
      - VITE_GOOGLE_CLIENT_ID=532800323819-grvpjhup1nh39d2doeq0ahnk61v51ip5.apps.googleusercontent.com
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./lifelink-frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
